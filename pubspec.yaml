name: todo_app
description: A Clean Architecture Flutter Todo App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  # Routing
  go_router: ^12.1.1
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  # Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  # Functional Programming
  dartz: ^0.10.1
  # Utils
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  # Code Generation
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  drift_dev: ^2.14.1
  # Testing
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
